services:
  mongo:
    image: mongo:5.0
    container_name: pharmacy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - pharmacy-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: pharmacy-backend
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/pharmacy}
      PORT: 3000
    # Host port 3001 → container port 3000. Grafana already uses host 3000.
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/usr/src/app/backend
    depends_on:
      - mongo
    networks:
      - pharmacy-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: pharmacy-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./src:/usr/src/app/src
      - ./angular.json:/usr/src/app/angular.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./tsconfig.app.json:/usr/src/app/tsconfig.app.json
      - ./tsconfig.spec.json:/usr/src/app/tsconfig.spec.json
      - ./browserslist:/usr/src/app/browserslist
    depends_on:
      - backend
    networks:
      - pharmacy-net

volumes:
  mongo-data:

networks:
  pharmacy-net:
    driver: bridge
